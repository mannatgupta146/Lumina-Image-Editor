<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <i class="ri-drop-fill"></i>
            <span>Lumina</span>
        </div>
        <div class="navbar-actions">
            <label for="upload" class="btn upload"><i class="ri-upload-2-line"></i> Upload</label>
            <input type="file" id="upload" accept="image/*" hidden>
            <button class="btn reset"><i class="ri-refresh-line"></i> Reset</button>
            <button class="btn export"><i class="ri-download-2-line"></i> Export</button>
        </div>
    </nav>
    <main>
        <div class="main-content">
            <div class="image-panel">
                <div class="image-container">
                    <div class="placeholder">
                        <i class="ri-image-upload-fill"></i>
                        <p>No image chosen</p>
                    </div>
                    <canvas id="image-canvas"></canvas>
                </div>
            </div>
            <aside class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title"><i class="ri-sliders-2-line"></i> Adjustments</div>
                    <div class="filters"></div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-title"><i class="ri-magic-line"></i> Presets</div>
                    <div class="presets"></div>
                </div>
            </aside>
        </div>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
